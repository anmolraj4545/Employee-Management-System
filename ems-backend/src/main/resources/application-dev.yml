spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ems_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true

logging:
  level:
    com.ems: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG




spring:
  application:
    name: ems-backend
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never let Hibernate auto-generate it
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Custom app properties
app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-production-min-256-bits-required}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 604800000    # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}   # set true in production (requires HTTPS)
  upload:
    base-dir: ${UPLOAD_DIR:./uploads}
  attendance:
    work-start-time: "09:30:00"
    late-grace-minutes: 15
